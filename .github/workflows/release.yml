name: Release

on:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_DRAFT: "false"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and app version
        id: validate
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^[vV]\d+\.\d+\.\d+$') {
            "run_release=false" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping non-release tag: $tag"
            exit 0
          }

          $version = $tag.Substring(1)
          $config = Get-Content -Raw "tauri-app/src-tauri/tauri.conf.json" | ConvertFrom-Json
          if ($config.version -ne $version) {
            throw "Tag version $version does not match tauri.conf.json version $($config.version)."
          }

          $cargoToml = Get-Content -Raw "tauri-app/src-tauri/Cargo.toml"
          $cargoVersion = [regex]::Match($cargoToml, '(?ms)^\[package\].*?^version\s*=\s*"(?<version>[^"]+)"')
          if (-not $cargoVersion.Success -or $cargoVersion.Groups["version"].Value -ne $version) {
            throw "Tag version $version does not match tauri-app/src-tauri/Cargo.toml package version."
          }

          "run_release=true" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Extract release notes
        id: notes
        if: steps.validate.outputs.run_release == 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.validate.outputs.tag }}"
          $content = Get-Content -Raw "CHANGELOG.md"
          $pattern = "(?ims)^##\s+$([regex]::Escape($tag))\s*\r?\n(?<body>.*?)(?=^##\s+|\z)"
          $match = [regex]::Match($content, $pattern)
          if (-not $match.Success -or [string]::IsNullOrWhiteSpace($match.Groups["body"].Value)) {
            throw "CHANGELOG.md does not contain release notes for $tag."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $notesPath -Value $match.Groups["body"].Value.Trim() -Encoding utf8
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Cache cargo
        if: steps.validate.outputs.run_release == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri.exe
            target
            tauri-app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        if: steps.validate.outputs.run_release == 'true'
        shell: pwsh
        run: |
          if (-not (Get-Command cargo-tauri -ErrorAction SilentlyContinue)) {
            cargo install tauri-cli --version "^2" --locked
          }

      - name: Prepare frontend dist
        if: steps.validate.outputs.run_release == 'true'
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tauri-app/scripts/prepare-dist.ps1

      - name: Build workspace
        if: steps.validate.outputs.run_release == 'true'
        run: cargo build

      - name: Test core
        if: steps.validate.outputs.run_release == 'true'
        run: cargo test -p core

      - name: Validate updater signing secrets
        if: steps.validate.outputs.run_release == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret."
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret."
          }

      - name: Build NSIS installer
        if: steps.validate.outputs.run_release == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tauri-app/scripts/dist.ps1

      - name: Prepare release assets
        id: asset
        if: steps.validate.outputs.run_release == 'true'
        shell: pwsh
        run: |
          $bundleDirs = @(
            "tauri-app/src-tauri/target/release/bundle/nsis",
            "target/release/bundle/nsis"
          )
          $installer = Get-ChildItem -Path $bundleDirs -Filter "*setup.exe" -File -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS setup.exe found in $($bundleDirs -join ', ')."
          }
          $signature = Get-Item -LiteralPath "$($installer.FullName).sig" -ErrorAction SilentlyContinue
          if (-not $signature) {
            throw "No updater signature found beside $($installer.FullName)."
          }

          $assetName = "LAN.Mesh_${{ steps.validate.outputs.version }}_x64-setup.exe"
          $assetPath = Join-Path $env:RUNNER_TEMP $assetName
          $signatureName = "$assetName.sig"
          $signaturePath = Join-Path $env:RUNNER_TEMP $signatureName
          $latestJsonPath = Join-Path $env:RUNNER_TEMP "latest.json"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$assetName"
          $signatureContent = (Get-Content -Raw -LiteralPath $signature.FullName).Trim()
          $notes = Get-Content -Raw -LiteralPath "${{ steps.notes.outputs.notes_path }}"

          Copy-Item -LiteralPath $installer.FullName -Destination $assetPath -Force
          Copy-Item -LiteralPath $signature.FullName -Destination $signaturePath -Force
          @{
            version = "${{ steps.validate.outputs.version }}"
            notes = $notes.Trim()
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signatureContent
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -Path $latestJsonPath -Encoding utf8

          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "signature_name=$signatureName" >> $env:GITHUB_OUTPUT
          "signature_path=$signaturePath" >> $env:GITHUB_OUTPUT
          "latest_json_path=$latestJsonPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.validate.outputs.run_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.validate.outputs.tag }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes_path }}
        shell: pwsh
        run: |
          $args = @(
            "release", "create", $env:RELEASE_TAG,
            "--verify-tag",
            "--title", $env:RELEASE_TAG,
            "--notes-file", $env:RELEASE_NOTES
          )
          if (($env:RELEASE_DRAFT).ToLowerInvariant() -eq "true") {
            $args += "--draft"
          }
          gh @args

      - name: Upload release assets
        if: steps.validate.outputs.run_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.validate.outputs.tag }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
          ASSET_NAME: ${{ steps.asset.outputs.asset_name }}
          SIGNATURE_PATH: ${{ steps.asset.outputs.signature_path }}
          SIGNATURE_NAME: ${{ steps.asset.outputs.signature_name }}
          LATEST_JSON_PATH: ${{ steps.asset.outputs.latest_json_path }}
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            gh release upload $env:RELEASE_TAG `
              "$env:ASSET_PATH#$env:ASSET_NAME" `
              "$env:SIGNATURE_PATH#$env:SIGNATURE_NAME" `
              "$env:LATEST_JSON_PATH#latest.json" `
              --clobber
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            Start-Sleep -Seconds 5
          }
          exit 1
